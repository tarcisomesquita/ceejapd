<script>

//let scriptId = 'AKfycbwF-euP4EcYMAdy_OeF1HUyMuY2F0hUxFDhuWyN7sH6vlFIpfF6nHCyAnTWbPr2qbkrKg'; // FIN em arquivo_FazerEM
//let scriptId = 'AKfycbzAC1AegTNVEosFlppladTkTXqNlAJ-CwWXZn6ZRrHzaZdWpyN1FfEpbwxtThR0GE-7VA'; // acesso apenas de cadastrados 2
//let scriptId = 'AKfycbyVf3T34dxhgWYWebvuPE8o2JHQIhzLrIqOfDCK1UvdC_vGz6gLj20A30FS5EwTGZXdxw'; // fazer independe da ordem das colunas v103
//let scriptId = 'AKfycbxqbXPbniY3bCao-RZEmjz-Jm_rUFg3jrEgoqXWOwKaonmG0am8m8mlEXkIIP6e_BLNGA'; // coluna Status em importar
//let scriptId = 'AKfycbyAi2S9WWEE3YbytMj9dmIi3iJP4AjAtpn9_twlZ18ps0bgq-wyF5Pf0gkyaJwMPQD_nQ'; // status para Matriculas

let auth2;
let googleUser;

let usuario = '';
let token = '';
let ra;  // excluir
let tel; // excluir

const queryString = window.location.search;
const urlParams = new URLSearchParams(queryString);
ra = urlParams.get('ra');
tel = urlParams.get('tel');
if (! ra) ra = '';
if (! tel) tel = '';

let s = document.createElement('script');
s.src = 'https://apis.google.com/js/api:client.js';
document.head.appendChild(s);

let startApp = () => {
  gapi.load('auth2', initSignIn);
};

let initSignIn = () => {
  auth2 = gapi.auth2.init({client_id: '424899238646-9rov4v21n8936trraugrl3vcb3cs54id.apps.googleusercontent.com', scope:'profile email'});
  
  auth2.attachClickHandler(document.getElementById('customBtn'), {}, null, null);
  
  auth2.isSignedIn.listen(signinChanged);

  if (auth2.isSignedIn.get() == true) {
    auth2.signIn();
  }
};

let signinChanged = (val) => {
  if (val) {
    token = auth2.currentUser.get().getAuthResponse().id_token;
    usuario = auth2.currentUser.get().getBasicProfile().getEmail();
    document.cookie = `usuario=${usuario};expires=2027-01-01T00:00:00.000Z;path=/;samesite=none;secure;`;
    
    console.log(`signinChanged() > token = ${token}; usuario = ${usuario}`);
    
    document.getElementById('customBtn').style.display = 'none';
    document.getElementById('bmail').style.display = 'block';
    document.getElementById('mail').innerText = usuario;
    window.location.href = `https://script.google.com/macros/s/${scriptId}/exec?usuario=${usuario}&ra=${ra}&tel=${tel}&token=${token}`;
    //window.location.href = `https://script.google.com/macros/s/AKfycbzqvJ8oZ05VhERVUOi93Jf8CSzrzsRfePJDkRxYe0ek/dev?usuario=${usuario}&token=${token}`;
  }
  else {
    token = '';
    usuario = '';
    document.getElementById('bmail').style.display = 'none';
    document.getElementById('customBtn').style.display = 'inline';
  }
};

let sair = () => {
  if (auth2 == undefined) location.reload();
  else { auth2.signOut(); location.reload();}
};
</script>
